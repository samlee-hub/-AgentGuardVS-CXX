name: Library Demo

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  library-demo:
    runs-on: windows-latest
    env:
      AGENTGUARD_LLM_PROVIDER: file

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install vcpkg dependencies
        shell: pwsh
        run: vcpkg install --triplet x64-windows

      - name: Configure CMake
        shell: pwsh
        run: >
          cmake -S . -B build\vs2022-debug
          -G "Visual Studio 17 2022" -A x64
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake"

      - name: Build AgentGuardVS-CXX
        run: cmake --build build\vs2022-debug --config Debug

      - name: Run library-system demo with offline provider
        shell: pwsh
        run: |
          $env:AGENTGUARD_EXE = (Resolve-Path ".\build\vs2022-debug\Debug\AgentGuardVS.exe").Path
          .\examples\run-library-demo.ps1 -AgentGuardExe $env:AGENTGUARD_EXE
