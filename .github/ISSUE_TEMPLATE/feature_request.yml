name: Feature Request
description: Suggest a focused improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What Visual Studio C++ agent workflow problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the smallest useful change.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Reports
        - MSBuild verification
        - Semantic analysis
        - Skill/Plugin
        - CI/Release
        - Documentation
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Note safety, compatibility, or CI constraints.
