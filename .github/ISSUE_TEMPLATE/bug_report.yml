name: Bug Report
description: Report a reproducible AgentGuardVS-CXX bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction Steps
      description: Include commands, target solution shape, and provider used.
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Windows version, Visual Studio version, AgentGuardVS-CXX commit
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste redacted logs only. Do not include API keys.
      render: text
